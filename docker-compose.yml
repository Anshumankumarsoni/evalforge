version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: evalforge-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./test_suites:/app/test_suites
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/evalforge.db
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - evalforge-network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: evalforge-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - API_URL=http://api:8000
      - DATABASE_URL=sqlite+aiosqlite:////app/data/evalforge.db
    depends_on:
      - api
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - evalforge-network

networks:
  evalforge-network:
    driver: bridge
